<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Oktoobri Kutse</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f5f5f5;}
.progress-bar{color:#fff;font-weight:bold;}
</style>
</head>

<body>
<div class="container py-4">

<div class="card shadow text-center mb-3">
<div class="card-body">
<h4>🇪🇪 Oktoobri Kutse → Päevi reservini</h4>
<p id="clock"></p>
</div>
</div>

<ul class="nav nav-tabs mb-3">
<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#progressTab">📈 Edenemine</button>
</li>
<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#todayTab">🧹 Täna</button>
</li>
</ul>

<div class="tab-content">

<!-- EDENEMINE -->
<div class="tab-pane fade show active" id="progressTab">
<div class="card shadow">
<div class="card-body">

<input id="leftDays" class="form-control mb-3" readonly>

<div class="progress" style="height:30px">
<div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated">0%</div>
</div>

</div>
</div>
</div>

<!-- TÄNA -->
<div class="tab-pane fade" id="todayTab">
<div class="card shadow text-center mb-3">
<div class="card-body">
<p id="todayDate"></p>
<p><strong>Parem:</strong> <span id="todayRight"></span></p>
<p><strong>Vasak:</strong> <span id="todayLeft"></span></p>
</div>
</div>

<div class="card shadow text-center">
<div class="card-body">
<h5>Ala koristajad</h5>
<p id="areaCleaners"></p>
</div>
</div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* KUUPÄEVAD */
const START = new Date(2025,9,13)
const END   = new Date(2026,5,12)
const DUTY_START = new Date(2026,0,6)

/* TOAD */
const PAREM = ["KOSEMAA","KUUSEORG","LUMISTE","MÜÜR","PAASKIVI","PEETRIS","PINT","TAMME","JAKOBSON"]
const VASAK = ["SUDER","PISNENKO","TAMMUS","KASPAR","VIISPERT","NURMETALO","KAAREL","MARK","KRISTI"]

const ALL = [...PAREM,...VASAK]

const DAY = 86400000

function now(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Tallinn"}))
}

function day(d){
return new Date(d.getFullYear(),d.getMonth(),d.getDate())
}

function days(a,b){
return Math.floor((b-a)/DAY)
}

/* LIHTNE SHUFFLE */
function shuffle(arr,seed){
let a=[...arr]

function r(n){
let x=Math.sin(n)*10000
return x-Math.floor(x)
}

for(let i=a.length-1;i>0;i--){
const j=Math.floor(r(seed+i)*(i+1))
[a[i],a[j]]=[a[j],a[i]]
}

return a
}

/* KINDLALT TÖÖTAV ALA */
function getCleaners(today){

const seed = days(new Date(2025,0,1),today)

/* tänane */
let todayList = shuffle(ALL,seed).slice(0,8)

/* eilne */
let yesterdayList = shuffle(ALL,seed-1).slice(0,8)

/* eemaldame kattuvad */
let result = todayList.filter(n=>!yesterdayList.includes(n))

/* täidame puudu */
let i=1
while(result.length<8){

let extra = shuffle(ALL,seed+i)

extra.forEach(n=>{
if(result.length<8 && !result.includes(n) && !yesterdayList.includes(n)){
result.push(n)
}
})

i++
}

/* SAFETY (ei jää kunagi tühjaks) */
if(result.length===0){
return todayList
}

return result
}

/* UPDATE */
function update(){

const n=now()
const today=day(n)

clock.innerText = n.toLocaleDateString("et-EE")+" "+n.toLocaleTimeString("et-EE")

/* 65 päeva */
const left = days(today,day(END))
leftDays.value = left+" päeva"

const total = days(day(START),day(END))
const done = days(day(START),today)

const pct = Math.min(100,(done/total*100).toFixed(1))
progressBar.style.width=pct+"%"
progressBar.innerText=pct+"%"

todayDate.innerText = today.toLocaleDateString("et-EE")

const idx = days(day(DUTY_START),today)

todayRight.innerText = PAREM[Math.abs(idx)%PAREM.length]
todayLeft.innerText  = VASAK[Math.abs(idx)%VASAK.length]

/* ALA */
areaCleaners.innerText = getCleaners(today).join(", ")

}

document.addEventListener("DOMContentLoaded",()=>{
update()
setInterval(update,1000)
})

</script>

</body>
</html>
