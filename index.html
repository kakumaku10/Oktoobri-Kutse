<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Oktoobri Kutse</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f5f5f5;}
.progress-bar{color:white;font-weight:bold;}
</style>
</head>

<body>

<div class="container py-4">

<div class="card shadow text-center mb-3">
<div class="card-body">
<h4>🇪🇪 Oktoobri Kutse → <strong>Päevi reservini</strong></h4>
<p id="clock" class="fw-bold"></p>
</div>
</div>

<ul class="nav nav-tabs mb-3">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#progressTab">
📈 Edenemine
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#todayTab">
🧹 Täna
</button>
</li>

</ul>

<div class="tab-content">

<!-- EDENEMINE -->
<div class="tab-pane fade show active" id="progressTab">
<div class="card shadow">
<div class="card-body">

<label>Kogu periood</label>
<input id="totalDays" class="form-control mb-2" readonly>

<label>Tehtud</label>
<input id="doneDays" class="form-control mb-2" readonly>

<label>Jäänud</label>
<input id="leftDays" class="form-control mb-2" readonly>

<div class="progress mb-3" style="height:30px">
<div id="progressBar"
class="progress-bar progress-bar-striped progress-bar-animated">0%</div>
</div>

</div>
</div>
</div>

<!-- TÄNA -->
<div class="tab-pane fade" id="todayTab">
<div class="card shadow text-center">
<div class="card-body">

<h5>🧹 Täna</h5>

<p id="todayDate" class="fw-bold"></p>

<p><strong>Parem:</strong> <span id="todayRight"></span></p>
<p><strong>Vasak:</strong> <span id="todayLeft"></span></p>

<hr>

<h6>🪖 Ala koristajad</h6>
<ul id="randomList" class="list-group"></ul>

</div>
</div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* KUUPÄEVAD */
const START = new Date(2025,9,13)
const END   = new Date(2026,5,12)

/* TOAD */
const PAREM = ["ARU","SUDER","PISNENKO","TAMMUS","KASPAR","VIISPERT","NURMETALO","KAAREL","MARK","KRISTI"]
const VASAK = ["KOSEMAA","KUUSEORG","LUMISTE","MÜÜR","PAASKIVI","PEETRIS","PINT","TAMME","JAKOBSON"]

const DAY = 1000*60*60*24

function now(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Tallinn"}))
}

/* OLULINE FIX */
function daysBetween(a,b){
return Math.floor((b - a) / DAY)
}

function getToday(){
const n = now()
return new Date(n.getFullYear(), n.getMonth(), n.getDate())
}

/* SHUFFLE */
function shuffle(arr,seed){
let a=[...arr]
function r(n){let x=Math.sin(n)*10000;return x-Math.floor(x)}
for(let i=a.length-1;i>0;i--){
const j=Math.floor(r(seed+i)*(i+1))
[a[i],a[j]]=[a[j],a[i]]
}
return a
}

/* UPDATE */
function update(){

const n=now()
const today=getToday()

clock.innerText =
n.toLocaleDateString("et-EE")+" "+
n.toLocaleTimeString("et-EE")

const startDay = new Date(START.getFullYear(),START.getMonth(),START.getDate())
const endDay   = new Date(END.getFullYear(),END.getMonth(),END.getDate())

const total = daysBetween(startDay,endDay)
const done  = daysBetween(startDay,today)
const left  = daysBetween(today,endDay)

totalDays.value = total+" päeva"
doneDays.value  = done+" päeva"
leftDays.value  = left+" päeva"   // 👉 nüüd 67

const pct = Math.min(100,(done/total*100).toFixed(1))
progressBar.style.width=pct+"%"
progressBar.innerText=pct+"%"

/* TÄNA */
todayDate.innerText = today.toLocaleDateString("et-EE")

const index = daysBetween(new Date(2026,0,6),today)

todayRight.innerText = PAREM[Math.abs(index)%PAREM.length]
todayLeft.innerText  = VASAK[Math.abs(index)%VASAK.length]

/* ALA KORISTAJAD (lihtne ja kindel) */
const seed = daysBetween(new Date(2025,0,1),today)

const right = shuffle(PAREM,seed).slice(0,4)
const lefts = shuffle(VASAK,seed).slice(0,4)

randomList.innerHTML=""

;[...right,...lefts].forEach(n=>{
randomList.innerHTML+=`<li class="list-group-item">${n}</li>`
})

}

/* START */
document.addEventListener("DOMContentLoaded",function(){
update()
setInterval(update,1000)
})

</script>

</body>
</html>
