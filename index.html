<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Oktoobri Kutse</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f5f5f5;}
.progress-bar{
  color:#fff;
  font-weight:bold;
  text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;
}
</style>
</head>

<body>
<div class="container py-4">

<div class="card shadow text-center mb-3">
<div class="card-body">
<h4>🇪🇪 Oktoobri Kutse → Päevi reservini</h4>
<p id="clock" class="fw-bold"></p>
</div>
</div>

<ul class="nav nav-tabs mb-3">
<li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#progressTab">📈 Edenemine</button></li>
<li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#todayTab">🧹 Täna</button></li>
</ul>

<div class="tab-content">

<!-- EDENEMINE -->
<div class="tab-pane fade show active" id="progressTab">
<div class="card shadow">
<div class="card-body">

<label>Kogu periood</label>
<input id="totalDays" class="form-control mb-2" readonly>

<label>Tehtud</label>
<input id="doneDays" class="form-control mb-2" readonly>

<label>Jäänud</label>
<input id="leftDays" class="form-control mb-2" readonly>

<div class="progress mb-3" style="height:30px">
<div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated">0%</div>
</div>

</div>
</div>
</div>

<!-- TÄNA -->
<div class="tab-pane fade" id="todayTab">
<div class="card shadow text-center mb-3">
<div class="card-body">
<h5>Tänased korrapidajad</h5>
<p id="todayDate"></p>
<p><strong>Parem:</strong> <span id="todayRight"></span></p>
<p><strong>Vasak:</strong> <span id="todayLeft"></span></p>
</div>
</div>

<div class="card shadow text-center">
<div class="card-body">
<h5>Ala koristajad</h5>
<p id="areaCleaners"></p>
</div>
</div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* KUUPÄEVAD */
const START = new Date(2025,9,13);
const END   = new Date(2026,5,12);
const DUTY_START = new Date(2026,0,6);

/* TOAD */
const PAREM = ["KOSEMAA","KUUSEORG","LUMISTE","MÜÜR","PAASKIVI","PEETRIS","PINT","TAMME","JAKOBSON"];
const VASAK = ["SUDER","PISNENKO","TAMMUS","KASPAR PLANS","VIISPERT","NURMETALO","KAAREL PLANS","MARK","KRISTI"];

/* KÕIK */
const ALL = [...PAREM,...VASAK];

const DAY = 86400000;

/* AEG */
function now(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Tallinn"}));
}
function dayOnly(d){
  return new Date(d.getFullYear(),d.getMonth(),d.getDate());
}
function days(a,b){
  return Math.floor((b-a)/DAY);
}

/* SHUFFLE (päevapõhine) */
function shuffle(arr,seed){
  let a=[...arr];
  function r(n){
    let x=Math.sin(n)*10000;
    return x-Math.floor(x);
  }
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(r(seed+i)*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ALA KORISTAJAD - LIHTNE JA KINDel */
function getCleaners(today){

  // iga päev uus seed
  const seed = Math.floor(today.getTime()/DAY);

  // segame nimekirja
  const shuffled = shuffle(ALL,seed);

  // võtame esimesed 8
  return shuffled.slice(0,8);
}

/* UPDATE */
function update(){

  const n=now();
  const today=dayOnly(n);

  clock.innerText = n.toLocaleDateString("et-EE")+" "+n.toLocaleTimeString("et-EE");

  const total = days(dayOnly(START),dayOnly(END));
  const done  = days(dayOnly(START),today);
  const left  = days(today,dayOnly(END));

  totalDays.value = total+" päeva";
  doneDays.value  = done+" päeva";
  leftDays.value  = left+" päeva";

  const pct = Math.min(100,(done/total*100).toFixed(1));
  progressBar.style.width=pct+"%";
  progressBar.innerText=pct+"%";

  todayDate.innerText = today.toLocaleDateString("et-EE");

  const idx = days(dayOnly(DUTY_START),today);

  todayRight.innerText = PAREM[Math.abs(idx)%PAREM.length];
  todayLeft.innerText  = VASAK[Math.abs(idx)%VASAK.length];

  // 🔥 alati uus iga päev
  areaCleaners.innerText = getCleaners(today).join(", ");
}

/* START */
document.addEventListener("DOMContentLoaded",function(){
  update();
  setInterval(update,1000);
});

</script>

</body>
</html>
